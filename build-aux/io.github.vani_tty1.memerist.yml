app-id: io.github.vani_tty1.memerist
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: memerist
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: memerist
    buildsystem: meson
    sources:
      - type: dir
        path: ..