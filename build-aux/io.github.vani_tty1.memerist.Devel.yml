app-id: io.github.vani_tty1.memerist.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: memerist
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: imagemagick
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --without-x
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.2-27.tar.gz
        sha256: 485dad5226fda2417ea65f3eb6e3f63e7d5dfacacdf6f57f9c39b6ef1e3cb667


  - name: memerist
    buildsystem: meson
    config-opts:
      - -Dprofile=development
      - -Dapp_id_suffix=.Devel
    sources:
      - type: dir
        path: ..