app-id: io.github.vani_tty1.memerist.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: memerist
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: imagemagick
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --without-x
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.2-26.tar.gz
        sha256: d63594e334e1c410f600fb9370d78d49e4dc6f315722ca4ba083e864e5c354cb


  - name: memerist
    buildsystem: meson
    config-opts:
      - -Dprofile=development
      - -Dapp_id_suffix=.Devel
    sources:
      - type: dir
        path: ..